name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - "feature/**"

permissions:
  contents: read

jobs:
  build:
    name: Build, Check, and Dockerize
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect package scripts
        id: scripts
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const scripts = require("./package.json").scripts || {};
          for (const name of ["lint", "typecheck", "test"]) {
            console.log(`${name}=${Boolean(scripts[name])}`);
          }
          NODE

      - name: Lint
        if: steps.scripts.outputs.lint == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.scripts.outputs.typecheck == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.scripts.outputs.test == 'true'
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            -t marketplace:${{ github.sha }} .
